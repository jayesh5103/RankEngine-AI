version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: rankengine_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: rankengine
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:alpine
    container_name: rankengine_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
